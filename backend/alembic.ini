# Alembic configuration file.
# Reference: https://alembic.sqlalchemy.org/en/latest/tutorial.html

[alembic]
# Path to the migrations directory, relative to this file.
script_location = backend/migrations

# Template for generating new migration file names.
# %(rev)s  – short revision id
# %(slug)s – abbreviated description
# %(epoch)s – seconds since epoch
file_template = %%(epoch)s_%%(slug)s

# Prepend sys.path with these directories so Alembic can import the app.
prepend_sys_path = .

# Timezone used when generating "Create Date" comments.
timezone = UTC

# Maximum number of characters for the slug portion of file names.
truncate_slug_length = 40

# Whether to generate revision IDs using a hash (vs sequential int).
revision_environment = false

# Use the DATABASE_URL from the application environment.
# The actual URL is read dynamically in env.py; this key is a placeholder.
sqlalchemy.url = postgresql+asyncpg://postgres:postgres@localhost:5432/rideshare


# ---------------------------------------------------------------------------
# Logging
# ---------------------------------------------------------------------------

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
